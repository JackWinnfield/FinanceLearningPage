<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Valorisation par comparables</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<style>
  :root{--bg:#fff;--fg:#1a1a1a;--muted:#666;--line:#e2e2e2;--accent:#5e5ce6;--good:#3aa675;}
  @media (prefers-color-scheme:dark){:root{--bg:#1e1e2e;--fg:#e8e8e8;--muted:#9a9a9a;--line:#3a3a4a;--accent:#a5a3ff;--good:#57c99a;}}
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:var(--fg);background:var(--bg);padding:12px;}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px 16px;margin-bottom:12px;}
  .f label{display:block;font-size:12px;color:var(--muted);margin-bottom:3px;}
  .f input,.f select{width:100%;padding:6px 8px;border:1px solid var(--line);border-radius:6px;background:transparent;color:var(--fg);font-size:14px;}
  .f select option{color:#000;}
  #plot{width:100%;height:230px;margin-top:6px;}
  .out{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px;}
  .card{border:1px solid var(--line);border-radius:8px;padding:10px 12px;text-align:center;}
  .card .k{font-size:11px;color:var(--muted);}
  .card .v{font-size:18px;font-weight:700;margin-top:2px;}
  .card .v.good{color:var(--good);}
  .note{font-size:12px;color:var(--muted);margin-top:10px;line-height:1.5;}
</style>
</head>
<body>
  <div class="grid">
    <div class="f"><label>Type de multiple</label>
      <select id="type">
        <option value="ev">EV (EBITDA / EBIT / Sales)</option>
        <option value="eq">Capitaux propres (PER / P-CF / P-B)</option>
      </select></div>
    <div class="f"><label>Agrégat de la cible (m)</label><input id="agg" type="number" step="1" value="50"></div>
    <div class="f"><label>Multiple bas</label><input id="lo" type="number" step="0.5" value="7"></div>
    <div class="f"><label>Multiple médian</label><input id="md" type="number" step="0.5" value="9"></div>
    <div class="f"><label>Multiple haut</label><input id="hi" type="number" step="0.5" value="11"></div>
    <div class="f" id="ndWrap"><label>Dette nette (m)</label><input id="nd" type="number" step="1" value="120"></div>
    <div class="f"><label>Nombre d'actions (m, optionnel)</label><input id="sh" type="number" step="0.1" value="0"></div>
  </div>

  <div id="plot"></div>

  <div class="out">
    <div class="card"><div class="k">Capitaux propres — bas</div><div class="v" id="o_lo">—</div></div>
    <div class="card"><div class="k">Médian</div><div class="v good" id="o_md">—</div></div>
    <div class="card"><div class="k">Haut</div><div class="v" id="o_hi">—</div></div>
  </div>
  <div class="note" id="note"></div>

<script>
const $=id=>document.getElementById(id);
const ids=["type","agg","lo","md","hi","nd","sh"];

function equityFrom(mult){
  const agg=+$("agg").value, nd=+$("nd").value, type=$("type").value;
  const implied=mult*agg;
  return type==="ev" ? implied-nd : implied;   // EV → −dette nette ; equity → direct
}
function fmt(x){ return (Math.round(x*10)/10).toLocaleString("fr-FR"); }

function compute(){
  $("ndWrap").style.display = $("type").value==="ev" ? "block":"none";
  const sh=+$("sh").value;
  const lo=equityFrom(+$("lo").value), md=equityFrom(+$("md").value), hi=equityFrom(+$("hi").value);

  const perShare = sh>0 ? v=>` (${fmt(v/sh)} /action)` : ()=>"";
  $("o_lo").innerHTML=fmt(lo)+" m"+perShare(lo);
  $("o_md").innerHTML=fmt(md)+" m"+perShare(md);
  $("o_hi").innerHTML=fmt(hi)+" m"+perShare(hi);

  const dark=window.matchMedia("(prefers-color-scheme:dark)").matches;
  Plotly.react("plot",
    [{type:"bar",orientation:"h",y:["Haut","Médian","Bas"],x:[hi,md,lo],
      marker:{color:["#9a98e8","#5e5ce6","#9a98e8"]},
      hovertemplate:"%{y} : %{x:.1f} m<extra></extra>"}],
    {margin:{l:60,r:12,t:8,b:28},paper_bgcolor:"rgba(0,0,0,0)",plot_bgcolor:"rgba(0,0,0,0)",
     font:{color:dark?"#e8e8e8":"#1a1a1a",size:11},
     xaxis:{title:"Valeur des capitaux propres (m)",gridcolor:dark?"#3a3a4a":"#eee",zeroline:false}},
    {displayModeBar:false,responsive:true});

  const t=$("type").value==="ev"
    ? "Multiple d'EV : valeur implicite = multiple × agrégat, puis on retranche la dette nette pour obtenir les capitaux propres."
    : "Multiple de capitaux propres : la valeur implicite est directement celle des capitaux propres (pas de dette nette à retrancher).";
  $("note").textContent=t+" La fourchette bas–haut traduit la dispersion des comparables : une valorisation honnête s'exprime en intervalle, pas en point unique.";
}
ids.forEach(id=>$(id).addEventListener("input",compute));
compute();
</script>
</body>
</html>
