<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pondération d'indices</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<style>
  :root{--bg:#fff;--fg:#1a1a1a;--muted:#666;--line:#e2e2e2;--accent:#5e5ce6;}
  @media (prefers-color-scheme:dark){:root{--bg:#1e1e2e;--fg:#e8e8e8;--muted:#9a9a9a;--line:#3a3a4a;--accent:#a5a3ff;}}
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:var(--fg);background:var(--bg);padding:12px;}
  table{width:100%;border-collapse:collapse;margin-bottom:10px;font-size:14px;}
  th,td{border:1px solid var(--line);padding:5px 8px;text-align:right;}
  th:first-child,td:first-child{text-align:left;}
  th{color:var(--muted);font-weight:600;font-size:12px;}
  input{width:90px;padding:5px 6px;border:1px solid var(--line);border-radius:6px;background:transparent;color:var(--fg);font-size:14px;text-align:right;}
  #plot{width:100%;height:280px;}
</style>
</head>
<body>
  <table>
    <thead><tr><th>Titre</th><th>Prix</th><th>Actions en circulation (M)</th></tr></thead>
    <tbody id="rows">
      <tr><td>A</td><td><input class="p" type="number" value="100"></td><td><input class="n" type="number" value="1"></td></tr>
      <tr><td>B</td><td><input class="p" type="number" value="50"></td><td><input class="n" type="number" value="5"></td></tr>
      <tr><td>C</td><td><input class="p" type="number" value="20"></td><td><input class="n" type="number" value="10"></td></tr>
    </tbody>
  </table>
  <div id="plot"></div>

<script>
const ps=()=>[...document.querySelectorAll(".p")].map(e=>+e.value);
const ns=()=>[...document.querySelectorAll(".n")].map(e=>+e.value);
const names=["A","B","C"];

function compute(){
  const p=ps(), n=ns();
  const sumP=p.reduce((a,b)=>a+b,0);
  const caps=p.map((x,i)=>x*n[i]); const sumCap=caps.reduce((a,b)=>a+b,0);
  const N=p.length;
  const priceW=p.map(x=> sumP? x/sumP*100:0);
  const capW=caps.map(x=> sumCap? x/sumCap*100:0);
  const eqW=p.map(()=>100/N);

  const dark=window.matchMedia("(prefers-color-scheme:dark)").matches;
  const mk=(name,arr,color)=>({type:"bar",name,x:names,y:arr,marker:{color},
     text:arr.map(v=>v.toFixed(1)+"%"),textposition:"auto",
     hovertemplate:name+" — %{x}: %{y:.1f}%<extra></extra>"});
  Plotly.react("plot",
    [mk("Price-weighted",priceW,"#5e5ce6"),mk("Cap-weighted",capW,"#e8a33d"),mk("Equal-weighted",eqW,"#3aa675")],
    {barmode:"group",margin:{l:44,r:10,t:8,b:30},
     paper_bgcolor:"rgba(0,0,0,0)",plot_bgcolor:"rgba(0,0,0,0)",
     font:{color:dark?"#e8e8e8":"#1a1a1a",size:12},
     legend:{orientation:"h",y:-0.18,font:{size:11}},
     yaxis:{title:"Poids (%)",gridcolor:dark?"#3a3a4a":"#eee",zeroline:false}},
    {displayModeBar:false,responsive:true});
}
document.querySelectorAll("input").forEach(e=>e.addEventListener("input",compute));
compute();
</script>
</body>
</html>
