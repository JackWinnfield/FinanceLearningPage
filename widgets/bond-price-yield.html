<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Prix & rendement obligataire</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<style>
  :root{--bg:#fff;--fg:#1a1a1a;--muted:#666;--line:#e2e2e2;--accent:#5e5ce6;--good:#3aa675;--bad:#e8453d;}
  @media (prefers-color-scheme:dark){:root{--bg:#1e1e2e;--fg:#e8e8e8;--muted:#9a9a9a;--line:#3a3a4a;--accent:#a5a3ff;--good:#57c99a;--bad:#f0726a;}}
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:var(--fg);background:var(--bg);padding:12px;}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px 18px;margin-bottom:10px;}
  .f label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;}
  .f .val{color:var(--accent);font-weight:600;}
  input[type=range]{width:100%;accent-color:var(--accent);}
  #plot{width:100%;height:260px;}
  .res{display:flex;gap:14px;align-items:baseline;margin-top:8px;flex-wrap:wrap;}
  .res .price{font-size:24px;font-weight:700;}
  .badge{padding:3px 10px;border-radius:999px;font-size:13px;font-weight:600;}
  .note{font-size:12px;color:var(--muted);margin-top:8px;line-height:1.5;}
</style>
</head>
<body>
  <div class="grid">
    <div class="f"><label>Coupon annuel : <span class="val" id="l_c">8%</span></label><input type="range" id="c" min="0" max="12" step="0.5" value="8"></div>
    <div class="f"><label>Maturité : <span class="val" id="l_n">5 ans</span></label><input type="range" id="n" min="1" max="30" step="1" value="5"></div>
    <div class="f"><label>Rendement exigé (YTM) : <span class="val" id="l_y">4%</span></label><input type="range" id="y" min="0" max="14" step="0.25" value="4"></div>
  </div>
  <div id="plot"></div>
  <div class="res">
    <span class="price" id="price">—</span>
    <span class="badge" id="badge">—</span>
    <span class="f">pour un nominal de 100</span>
  </div>
  <div class="note" id="note"></div>

<script>
const $=id=>document.getElementById(id);
const F=100;
function bondPrice(cpn,n,y){
  const c=F*cpn; let pv=0;
  for(let t=1;t<=n;t++) pv+=c/Math.pow(1+y,t);
  return pv+F/Math.pow(1+y,n);
}
function compute(){
  const cpn=+$("c").value/100, n=+$("n").value, y=+$("y").value/100;
  $("l_c").textContent=(cpn*100).toFixed(1)+"%";
  $("l_n").textContent=n+" ans";
  $("l_y").textContent=(y*100).toFixed(2)+"%";
  const price=bondPrice(cpn,n,y);
  $("price").textContent=price.toFixed(2);

  const b=$("badge");
  if(price>F+0.01){ b.textContent="PRIME (prix > pair)"; b.style.background="rgba(58,166,117,.15)"; b.style.color="var(--good)"; }
  else if(price<F-0.01){ b.textContent="DÉCOTE (prix < pair)"; b.style.background="rgba(232,69,61,.15)"; b.style.color="var(--bad)"; }
  else { b.textContent="AU PAIR"; b.style.background="rgba(94,92,230,.15)"; b.style.color="var(--accent)"; }

  const xs=[],ys=[];
  for(let r=0;r<=0.14001;r+=0.0025){ xs.push(r*100); ys.push(bondPrice(cpn,n,r)); }
  const dark=window.matchMedia("(prefers-color-scheme:dark)").matches;
  Plotly.react("plot",
    [{x:xs,y:ys,mode:"lines",line:{color:"#5e5ce6",width:3},hovertemplate:"YTM %{x:.2f}%<br>prix %{y:.2f}<extra></extra>"},
     {x:[y*100],y:[price],mode:"markers",marker:{size:12,color:"#e8453d"},hovertemplate:"YTM %{x:.2f}%<br>prix %{y:.2f}<extra></extra>"},
     {x:[0,14],y:[F,F],mode:"lines",line:{color:dark?"#666":"#bbb",width:1,dash:"dot"},hoverinfo:"skip"}],
    {margin:{l:46,r:10,t:8,b:34},paper_bgcolor:"rgba(0,0,0,0)",plot_bgcolor:"rgba(0,0,0,0)",
     font:{color:dark?"#e8e8e8":"#1a1a1a",size:11},showlegend:false,
     xaxis:{title:"Rendement exigé YTM (%)",gridcolor:dark?"#3a3a4a":"#eee",zeroline:false},
     yaxis:{title:"Prix (nominal 100)",gridcolor:dark?"#3a3a4a":"#eee",zeroline:false}},
    {displayModeBar:false,responsive:true});

  $("note").innerHTML=`La courbe est <b>décroissante</b> (prix et rendement varient en sens inverse) et <b>convexe</b>. `+
    `La ligne pointillée est le pair (100) : le prix la croise exactement quand <b>YTM = coupon</b>. Plus la maturité est longue, plus le prix est sensible au rendement.`;
}
["c","n","y"].forEach(id=>$(id).addEventListener("input",compute));
compute();
</script>
</body>
</html>
